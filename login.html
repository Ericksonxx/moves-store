<!DOCTYPE html>
<html lang="en">
  <script defer src="/_vercel/insights/script.js"></script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoveOps Store — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F2ED;
      --ink: #0D0D0D;
      --surface: #FFFFFF;
      --accent: #1A3A2A;
      --accent2: #2D6048;
      --muted: #888880;
      --muted2: #BDBDB5;
      --border: #E2DED7;
      --border2: #EDE9E3;
      --red: #C0392B;
      --red-bg: rgba(192,57,43,0.07);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(45,96,72,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .brand-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-mark svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; }
    .brand-name { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; line-height: 1.3; }
    .brand-name small { display: block; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

    /* card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
    }

    .card-title {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.15;
    }
    .card-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* form */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(45,96,72,0.1);
    }
    .field input::placeholder { color: var(--muted2); }
    .field input.error { border-color: var(--red); }

    .error-msg {
      display: none;
      background: var(--red-bg);
      border: 1px solid rgba(192,57,43,0.15);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .error-msg.show { display: flex; align-items: center; gap: 8px; }

    .btn-signin {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-signin:hover { background: var(--accent2); }
    .btn-signin:active { transform: scale(0.99); }
    .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }

    /* spinner inside button */
    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-signin.loading .btn-spinner { display: block; }
    .btn-signin.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* footer */
    .card-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border2);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
    .card-footer a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* bottom tagline */
    .tagline {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted2);
      letter-spacing: 0.3px;
    }

    /* fade in */
    .wrap { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 14 14"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg>
    </div>
    <div class="brand-name">MoveOps Store<small>Brand portal</small></div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your brand dashboard to monitor your PLV installation campaigns.</div>

    <div class="error-msg" id="error-msg">
      <span>⚠</span><span id="error-text">Invalid email or password.</span>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@yourbrand.com" autocomplete="email">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-signin" id="btn" onclick="signIn()">
      <span class="btn-label">Sign in →</span>
      <div class="btn-spinner"></div>
    </button>

    <div class="card-footer">
      Need access? Contact your MoveOps account manager at<br>
      <a href="mailto:hello@moveops.services">hello@moveops.services</a>
    </div>
  </div>

  <div class="tagline">MoveOps Store — Retail execution, tracked.</div>
</div>

<script>
const SB = 'https://ysltwsexfeweqjmzdahs.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbHR3c2V4ZmV3ZXFqbXpkYWhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjI4MjYsImV4cCI6MjA4ODYzODgyNn0.pgABlsoHBq9LkOqtJhXd-LF7XKMla_fgR1CbWAWpl_k';

// if already logged in, skip to dashboard
const existing = sessionStorage.getItem('sb_token');
if (existing) window.location.href = 'dashboard.html';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') signIn();
});
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function signIn() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const errEl = document.getElementById('error-msg');

  // reset
  errEl.classList.remove('show');
  document.getElementById('email').classList.remove('error');
  document.getElementById('password').classList.remove('error');

  if (!email || !password) {
    showError('Please enter your email and password.');
    if (!email) document.getElementById('email').classList.add('error');
    if (!password) document.getElementById('password').classList.add('error');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(`${SB}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error_description || data.msg || 'Invalid credentials');
    }

    // store session
    sessionStorage.setItem('sb_token', data.access_token);
    sessionStorage.setItem('sb_user', JSON.stringify({ email: data.user?.email, id: data.user?.id }));

    // redirect
    window.location.href = 'dashboard.html';

  } catch (e) {
    showError(e.message.includes('Invalid') ? 'Invalid email or password.' : e.message);
    document.getElementById('password').classList.add('error');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }

  btn.classList.remove('loading');
  btn.disabled = false;
}

function showError(msg) {
  document.getElementById('error-text').textContent = msg;
  document.getElementById('error-msg').classList.add('show');
}
</script>
</body>
</html>
